<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatternShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M12 12L12 22" stroke="currentColor" stroke-width="2"/>
          <path d="M12 12L2 7" stroke="currentColor" stroke-width="2"/>
          <path d="M12 12L22 7" stroke="currentColor" stroke-width="2"/>
        </svg>
        <h1>PatternShield <small>v2</small></h1>
      </div>
      <div class="status">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Checking...</span>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="scan">🔍 Scan</button>
      <button class="tab" data-tab="settings">⚙️ Settings</button>
      <button class="tab" data-tab="stats">📊 Stats</button>
    </nav>

    <!-- SCAN TAB -->
    <div id="tab-scan" class="tab-content active">
      <!-- Site Score -->
      <div class="site-score" id="siteScoreCard" style="display:none;">
        <div class="score-badge" id="scoreGrade">A</div>
        <div class="score-info">
          <div class="score-label">Site Score: <strong id="scoreValue">100</strong>/100</div>
          <div class="score-risk" id="scoreRisk">Low Risk</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-summary">
        <div class="stat-card">
          <div class="stat-value" id="detectionCount">0</div>
          <div class="stat-label">Patterns</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="severityMax">—</div>
          <div class="stat-label">Severity</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="confidenceAvg">0%</div>
          <div class="stat-label">Confidence</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="rescanBtn" class="btn btn-primary">🔄 Rescan</button>
        <button id="clearBtn" class="btn btn-secondary">✕ Clear</button>
      </div>

      <!-- Detections -->
      <div class="section">
        <h3 class="section-title">Detected Patterns</h3>
        <div id="detectionsList" class="detections-list">
          <div class="empty-state"><p>Scanning page...</p></div>
        </div>
      </div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="tab-settings" class="tab-content">
      <div class="section">
        <h3 class="section-title">General</h3>
        <label class="toggle-setting">
          <input type="checkbox" id="autoScanToggle" checked>
          <span>Auto-scan pages</span>
        </label>
        <label class="toggle-setting">
          <input type="checkbox" id="highlightToggle" checked>
          <span>Highlight patterns</span>
        </label>
        <label class="toggle-setting">
          <input type="checkbox" id="offlineToggle">
          <span>Offline mode (local rules only)</span>
        </label>
        <label class="toggle-setting">
          <input type="checkbox" id="feedbackToggle" checked>
          <span>Show feedback buttons</span>
        </label>
        <label class="toggle-setting">
          <input type="checkbox" id="temporalToggle" checked>
          <span>Temporal detection</span>
        </label>
      </div>

      <div class="section">
        <h3 class="section-title">Confidence Threshold</h3>
        <div class="slider-row">
          <input type="range" id="thresholdSlider" min="10" max="90" value="35" class="slider">
          <span id="thresholdValue" class="slider-value">35%</span>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title">API URL</h3>
        <div class="input-row">
          <input type="text" id="apiUrlInput" class="text-input" placeholder="http://localhost:5000">
          <button id="saveUrlBtn" class="btn btn-small">Save</button>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title">Pattern Types</h3>
        <div id="patternToggles" class="pattern-toggles"></div>
      </div>

      <div class="section">
        <h3 class="section-title">Whitelist</h3>
        <button id="whitelistBtn" class="btn btn-secondary btn-full">
          Add current site to whitelist
        </button>
      </div>
    </div>

    <!-- STATS TAB -->
    <div id="tab-stats" class="tab-content">
      <div class="section">
        <h3 class="section-title">Detection History</h3>
        <div class="stat-row"><span>Total Scans</span><strong id="totalScans">0</strong></div>
        <div class="stat-row"><span>Total Detections</span><strong id="totalDetections">0</strong></div>
      </div>
      <div class="section">
        <h3 class="section-title">By Pattern Type</h3>
        <div id="patternBreakdown" class="pattern-breakdown"></div>
      </div>
      <div class="section">
        <h3 class="section-title">Top Sites</h3>
        <div id="topSites" class="top-sites"></div>
      </div>
      <div class="actions">
        <button id="resetStatsBtn" class="btn btn-secondary btn-full">Reset Stats</button>
      </div>
    </div>
  </div>

  <script src="../utils/config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
