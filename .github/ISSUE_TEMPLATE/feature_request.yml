name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve PatternShield? Describe it below.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - New dark pattern category
        - LLM / AI detection improvements
        - Chrome Extension UI/UX
        - Backend API
        - Database / Persistence
        - Temporal Analysis
        - Performance
        - Documentation
        - Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "Currently PatternShield doesn't detect..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your suggested approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, or examples that support this request.
