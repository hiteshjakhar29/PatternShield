name: PatternShield CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  DOCKER_IMAGE_NAME: patternshield-api

jobs:
  # ============================================================================
  # JOB 1: Code Quality & Linting
  # ============================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: ${{ runner.os }}-pip-lint-

    - name: Install linting tools
      run: pip install flake8 black isort

    - name: black (formatting check)
      run: black --check --diff backend/
      continue-on-error: true

    - name: isort (import order)
      run: isort --check-only --diff backend/
      continue-on-error: true

    - name: flake8 (errors only)
      run: flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: flake8 (style warnings)
      run: flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ============================================================================
  # JOB 2: Security Scanning
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install bandit
      run: pip install bandit

    - name: Run bandit
      run: bandit -r backend/ -ll -f json -o bandit-report.json
      continue-on-error: true

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json

  # ============================================================================
  # JOB 3: Unit & Integration Tests
  # ============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements-prod.txt
        pip install "pytest>=7.4" "pytest-cov>=4.1"
        python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('averaged_perceptron_tagger', quiet=True)" || true

    - name: Run tests
      run: |
        cd backend
        pytest tests/ --cov=. --cov-report=xml --cov-report=html -v --tb=short
      env:
        RATE_LIMIT_ENABLED: "false"
        API_KEY_REQUIRED: "false"
        FEEDBACK_FILE: "/tmp/ci_feedback.jsonl"
        TEMPORAL_FILE: "/tmp/ci_temporal.json"
        DATABASE_URL: "sqlite:////tmp/ci_patternshield.db"
        # ANTHROPIC_API_KEY intentionally absent — LLM disabled in CI (rule-based only)
        LLM_ENABLED: "false"
        TESTING: "true"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: backend/htmlcov/

  # ============================================================================
  # JOB 4: Docker Build & Smoke Test
  # ============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ lint, test ]

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build \
          -f ./backend/Dockerfile \
          -t ${{ env.DOCKER_IMAGE_NAME }}:test \
          ./backend

    - name: Smoke test container
      run: |
        docker run -d -p 5000:5000 \
          -e RATE_LIMIT_ENABLED=false \
          -e API_KEY_REQUIRED=false \
          --name ps-test ${{ env.DOCKER_IMAGE_NAME }}:test

        echo "=== Waiting for container to be ready (up to 60s) ==="
        HEALTHY=false
        for i in $(seq 1 20); do
          if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
            HEALTHY=true
            echo "Container healthy after $((i * 3))s"
            break
          fi
          echo "  attempt $i/20 — not ready yet, sleeping 3s"
          sleep 3
        done

        echo "=== Container logs ==="
        docker logs ps-test

        if [ "$HEALTHY" != "true" ]; then
          echo "FATAL: container never became healthy"
          docker rm -f ps-test || true
          exit 1
        fi

        echo "=== Health check response ==="
        RESPONSE=$(curl -sf http://localhost:5000/health)
        echo "$RESPONSE"
        echo "$RESPONSE" | python3 -c "
        import sys, json
        d = json.load(sys.stdin)
        assert d['status'] == 'healthy', f'Expected healthy, got: {d}'
        print('PASS — status:', d['status'])
        "

        docker rm -f ps-test

  # ============================================================================
  # JOB 5: Deploy to Render (main branch only)
  # ============================================================================
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [ docker-build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Trigger Render deploy hook
      run: |
        if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deployment triggered on Render"
        else
          echo "RENDER_DEPLOY_HOOK not configured — skipping"
        fi

  # ============================================================================
  # JOB 6: Summary
  # ============================================================================
  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [ lint, test, docker-build, deploy-render ]
    if: always()

    steps:
    - name: Write summary
      run: |
        {
          echo "## PatternShield CI Summary"
          echo ""
          echo "| Job | Result |"
          echo "|-----|--------|"
          echo "| Lint   | ${{ needs.lint.result }} |"
          echo "| Tests  | ${{ needs.test.result }} |"
          echo "| Docker | ${{ needs.docker-build.result }} |"
          echo "| Deploy | ${{ needs.deploy-render.result }} |"
          echo ""
          echo "**Branch:** \`${{ github.ref_name }}\`  |  **SHA:** \`${{ github.sha }}\`"
        } >> $GITHUB_STEP_SUMMARY
