version: '3.8'

services:
  # PatternShield Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patternshield-api
    ports:
      - "5000:5000"
    environment:
      # Flask Configuration
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      
      # CORS Settings
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      
      # Rate Limiting
      - RATE_LIMIT_ENABLED=True
      - RATE_LIMIT_PER_HOUR=100
      - RATE_LIMIT_PER_MINUTE=20
      
      # Authentication (optional)
      - API_KEY_REQUIRED=${API_KEY_REQUIRED:-False}
      - API_KEY=${API_KEY:-}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    volumes:
      # Mount logs for persistence
      - ./logs:/app/logs
      # Optional: Mount models if training locally
      # - ./models:/app/models
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - patternshield-network

  # Optional: Nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: patternshield-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - patternshield-network

  # Optional: Redis for rate limiting (more scalable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: patternshield-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   networks:
  #     - patternshield-network

networks:
  patternshield-network:
    driver: bridge

